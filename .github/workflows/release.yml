name: Release

# 推送 vX.Y.Z 标签时:多平台构建 + 签名 + 发布 GitHub Release,并生成 updater 清单
# (latest.json),供应用内「在线更新」消费。与 ci.yml 分离,互不影响。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-14
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch bundled Codex app-server (sidecar)
        shell: bash
        run: scripts/fetch-codex.sh "${{ matrix.target }}"

      - name: Build UI design system
        run: pnpm build:ui

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 更新包签名私钥(minisign)。在仓库 Settings → Secrets 配置;
          # 本项目密钥无密码,_PASSWORD 留空即可。公钥已在 tauri.conf.json。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "AiPanel ${{ github.ref_name }}"
          releaseBody: "应用内「设置 · 在线更新」可一键升级到本版本。下方资产为各平台安装包。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
